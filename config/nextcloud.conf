<VirtualHost *:8080>
    ServerName localhost
    DocumentRoot /data/data/com.termux/files/home/nextcloud_html

    <Directory /data/data/com.termux/files/home/nextcloud_html>
        Require all granted
        AllowOverride None
        Options +FollowSymLinks
    </Directory>
    <Directory /data/data/com.termux/files/home/nextcloud_html>
        Options -Indexes +FollowSymLinks
        AllowOverride All
        Require all granted
    </Directory>

    <FilesMatch \.php$>
        SetHandler "proxy:fcgi://127.0.0.1:9000"
    </FilesMatch>

    <IfModule mod_expires.c>
        ExpiresActive On
        ExpiresByType image/jpeg "access plus 1 month"
        ExpiresByType image/png  "access plus 1 month"
        ExpiresByType text/css   "access plus 1 week"
        ExpiresByType application/javascript "access plus 1 week"
    </IfModule>

    <IfModule mod_deflate.c>
        AddOutputFilterByType DEFLATE text/html text/plain text/css text/xml text/markdown
        AddOutputFilterByType DEFLATE application/javascript application/json application/xml
        AddOutputFilterByType DEFLATE image/svg+xml image/x-icon
        AddOutputFilterByType DEFLATE text/csv text/tab-separated-values
        DeflateCompressionLevel 6
    </IfModule>

    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "no-referrer"
    Header always set Strict-Transport-Security "max-age=15552000; includeSubDomains"

    ErrorLog  /data/data/com.termux/files/home/logs/apache_error.log
    CustomLog /data/data/com.termux/files/home/logs/apache_access.log combined
</VirtualHost>
